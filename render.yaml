# Blueprint Render — https://render.com/docs/blueprint-spec
# Conectá el repo de GitHub y Render crea el servicio solo.
services:
  - type: web
    name: victor-films
    runtime: node
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: "20"
      # En producción: desactivá OCR local (Tesseract pesa mucho en el plan free)
      - key: DETECTION_DISABLE_LOCAL
        value: "true"
      # Etiquetado manual solamente (sin IA / OCR automático)
      - key: DETECTION_DISABLED
        value: "true"
      - key: ADMIN_PASSWORD
        sync: false
      # Completá el resto en el panel de Render → Environment:
      # NEXT_PUBLIC_APP_URL, NEXT_PUBLIC_SUPABASE_URL, NEXT_PUBLIC_SUPABASE_ANON_KEY,
      # SUPABASE_SERVICE_ROLE_KEY, STRIPE_*, DOWNLOAD_SIGNING_SECRET (opcional Cloudinary)
